<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoralKita - Register Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="form-container">
        <div class="h2">Register</div>
        <div class="h3">Join the coral conservation community</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="input-form" action="{{ url_for('register.register') }}" method="POST">
            <div class="form-box">
                <div class="input-box">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Jane Doe" value="{{ request.form.get('name', '') }}" required>
                </div>
                <div class="input-box">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="jane@gmail.com" value="{{ request.form.get('email', '') }}" required>
                </div>
                <div class="input-box password-box">
                    <label for="password">Password</label>
                    <div class="password-field-wrap">
                        <input type="password" id="password" name="password" placeholder="Min 8 characters and at least 1 number" autocomplete="new-password" required>
                        <button type="button" class="show-password-toggle" data-target="password" aria-label="Show password">👁</button>
                    </div>
                </div>
                <div class="input-box">
                    <label for="role">Role</label>
                    <select id="role" name="role-selection" required>
                        <option value="Scientific Reviewer" {% if request.form.get('role-selection') == 'Scientific Reviewer' %}selected{% endif %}>Scientific Reviewer</option>
                        <option value="Marine Biologist" {% if request.form.get('role-selection') == 'Marine Biologist' %}selected{% endif %}>Marine Biologist</option>
                        <option value="Educator" {% if request.form.get('role-selection') == 'Educator' %}selected{% endif %}>Educator</option>
                    </select>
                </div>
                <button type="submit" class="form-btn">Register</button>
            </div>
        </form>
        <div class="redirect-link">Already have an account? <a href="{{ url_for('login.login') }}">Log in here</a></div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
